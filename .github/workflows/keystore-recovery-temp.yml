name: keystore-recovery-temp

# TEMPORARY workflow — keystore recovery to sandbox. Delete after use.
# Encrypts the keystore + credentials with AES-256 (PBKDF2) using a one-time
# passphrase held only in the RECOVERY_PASSPHRASE secret, then uploads the
# ciphertext as an artifact. No plaintext key material touches logs or artifacts.

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Package and encrypt keystore material
        shell: bash
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PASSPHRASE: ${{ secrets.RECOVERY_PASSPHRASE }}
        run: |
          set -euo pipefail
          umask 077
          workdir="$(mktemp -d)"
          printf '%s' "$KS_B64" | base64 -d > "$workdir/emberdelve-upload.keystore"
          {
            printf 'storePassword=%s\n' "$KS_PASS"
            printf 'keyAlias=%s\n' "$KS_ALIAS"
          } > "$workdir/credentials.txt"
          tar -C "$workdir" -cf bundle.tar emberdelve-upload.keystore credentials.txt
          openssl enc -aes-256-cbc -pbkdf2 -salt -in bundle.tar \
            -out bundle.tar.enc -pass env:PASSPHRASE
          rm -rf "$workdir" bundle.tar
          echo "Encrypted bundle ready ($(stat -c%s bundle.tar.enc) bytes)."
      - name: Upload encrypted bundle
        uses: actions/upload-artifact@v4
        with:
          name: keystore-recovery-encrypted
          path: bundle.tar.enc
          retention-days: 1
          if-no-files-found: error
