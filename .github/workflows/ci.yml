name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Flutter stable pinned. Update deliberately (channel stable, Dart >= 3.8.1).
  FLUTTER_VERSION: 3.32.7

jobs:
  test:
    name: Analyze + test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Analyze (fatal on warnings)
        run: flutter analyze
      - name: Test (sim determinism, map, content, autoplay balance, UI smoke)
        run: flutter test

  build-android:
    name: Build Android debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Build debug APK
        run: flutter build apk --debug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: emberdelve-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 30
