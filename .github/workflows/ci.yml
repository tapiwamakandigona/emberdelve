# Draft: .github/workflows/ci.yml for the Flutter era — apply in wave 3 after `flutter create .`
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, flutter]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Sim test suite (golden pinned)
        run: flutter test
        env:
          EMBERDELVE_GOLDEN: "311044885"

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true
      - name: Restore permanent signing keystore (docs/release.md)
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          cat > android/key.properties <<EOF
          storeFile=$RUNNER_TEMP/upload.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      - run: flutter pub get
      - name: Build release APK (signed with permanent key)
        run: flutter build apk --release --split-per-abi
      - name: Build appbundle (Play upload artifact)
        run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: emberdelve-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: emberdelve-aab
          path: build/app/outputs/bundle/release/app-release.aab
