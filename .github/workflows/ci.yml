name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Defold 1.13.0 — pinned. Update sha1 + version together (d.defold.com/stable/info.json).
  DEFOLD_SHA1: f735c12192bf95684e6ae1ae27c400b8170fc6d8
  DEFOLD_VERSION: 1.13.0

jobs:
  test:
    name: Sim tests (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.4
        run: sudo apt-get update -q && sudo apt-get install -y -q lua5.4
      - name: Run simulation test suite
        run: lua5.4 tests/run_tests.lua

  build-android:
    name: Bundle Android debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Cache bob.jar
        id: cache-bob
        uses: actions/cache@v4
        with:
          path: bob.jar
          key: bob-${{ env.DEFOLD_SHA1 }}
      - name: Download bob.jar
        if: steps.cache-bob.outputs.cache-hit != 'true'
        run: curl -sSL -o bob.jar "https://d.defold.com/archive/${DEFOLD_SHA1}/bob/bob.jar"
      - name: Verify bob version
        run: java -jar bob.jar --version
      - name: Resolve dependencies
        run: java -jar bob.jar resolve
      - name: Build and bundle (debug APK, arm64 + armv7)
        run: |
          java -jar bob.jar \
            --archive \
            --platform armv7-android \
            --architectures armv7-android,arm64-android \
            --variant debug \
            --bundle-format apk \
            --bundle-output build/bundle \
            resolve build bundle
      - name: List bundle output
        run: find build/bundle -type f | sort
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: emberdelve-debug-apk
          path: build/bundle/**/*.apk
          if-no-files-found: error
          retention-days: 30
