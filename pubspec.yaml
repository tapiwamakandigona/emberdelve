name: emberdelve
description: "Emberdelve — turn-based dice-builder roguelite. Tsoro Studios."
publish_to: 'none'

# versionName+versionCode for Android.
version: 0.3.1+4

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Save-file location for autosave/meta persistence (the sim core stays
  # sealed pure Dart with zero runtime deps).
  path_provider: ^2.1.4
  # Music loops + SFX one-shots (assets-integration).
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - CREDITS.md
    - assets/images/sprite_meta.json
    - assets/images/enemies/
    - assets/images/characters/
    - assets/images/backgrounds/
    - assets/images/ui/
    - assets/images/ui/dice/
    - assets/images/ui/currency/
    - assets/images/ui/events/
    - assets/images/ui/nodes/
    - assets/images/ui/relics/
    - assets/audio/music/
    - assets/audio/sfx/
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
